<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - ProManage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="inline-block bg-white p-4 rounded-full shadow-lg mb-4">
        <svg class="w-12 h-12 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white mb-2">ProManage</h1>
      <p class="text-purple-100">WorkFlow 32 Management System</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Đăng nhập</h2>

      <!-- Error Alert -->
      <div id="errorAlert" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
        <div class="flex items-center">
          <svg class="w-5 h-5 text-red-500 mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
          </svg>
          <p id="errorMessage" class="text-red-700 text-sm font-medium"></p>
        </div>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <!-- Phone Number -->
        <div class="mb-4">
          <label for="phone" class="block text-gray-700 font-medium mb-2">
            Số điện thoại
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
              </svg>
            </div>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="0393588269"
              pattern="0[0-9]{9}"
              required
              class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            />
          </div>
          <p class="mt-1 text-sm text-gray-500">Nhập số điện thoại 10 số</p>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label for="password" class="block text-gray-700 font-medium mb-2">
            Mật khẩu
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              minlength="6"
              class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            />
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="loginBtn"
          class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center"
        >
          <span id="loginBtnText">Đăng nhập</span>
          <svg id="loginSpinner" class="hidden ml-2 animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </form>

      <!-- Footer Info -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          WorkFlow 32 v3.0 - 
          <span class="font-semibold">March 2026</span>
        </p>
      </div>
    </div>

    <!-- Role Info -->
    <div class="mt-6 bg-white bg-opacity-20 backdrop-blur-lg rounded-xl p-4 text-white text-sm">
      <p class="font-semibold mb-2">ℹ️ Phân quyền hệ thống:</p>
      <ul class="space-y-1 text-purple-100">
        <li>• <strong>Admin:</strong> Tổng giám đốc, Kho tổng, Phó TGĐ, GĐ khu vực, Phó GĐ</li>
        <li>• <strong>Manager:</strong> Giám đốc chi nhánh</li>
        <li>• <strong>Employee:</strong> Các chức vụ khác</li>
      </ul>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    const loginForm = document.getElementById('loginForm');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    const loginSpinner = document.getElementById('loginSpinner');

    // Show error
    function showError(message) {
      errorMessage.textContent = message;
      errorAlert.classList.remove('hidden');
      setTimeout(() => {
        errorAlert.classList.add('hidden');
      }, 5000);
    }

    // Hide error
    function hideError() {
      errorAlert.classList.add('hidden');
    }

    // Set loading state
    function setLoading(loading) {
      if (loading) {
        loginBtn.disabled = true;
        loginBtn.classList.add('opacity-75', 'cursor-not-allowed');
        loginBtnText.textContent = 'Đang đăng nhập...';
        loginSpinner.classList.remove('hidden');
      } else {
        loginBtn.disabled = false;
        loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        loginBtnText.textContent = 'Đăng nhập';
        loginSpinner.classList.add('hidden');
      }
    }

    // Handle login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;

      // Validate
      if (!phone || !password) {
        showError('Vui lòng nhập đầy đủ thông tin');
        return;
      }

      // Phone format validation
      if (!/^0\d{9}$/.test(phone)) {
        showError('Số điện thoại phải có 10 số và bắt đầu bằng số 0');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ phone, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Đăng nhập thất bại');
        }

        // Success
        if (data.success && data.token) {
          // Save token to localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('employee', JSON.stringify(data.employee));

          // Show success message
          loginBtnText.textContent = '✓ Đăng nhập thành công!';
          loginBtn.classList.remove('bg-purple-600', 'hover:bg-purple-700');
          loginBtn.classList.add('bg-green-500');

          // Redirect based on role
          setTimeout(() => {
            const role = data.employee.role;
            if (role === 'admin') {
              window.location.href = '/admin/dashboard';
            } else if (role === 'manager') {
              window.location.href = '/manager/dashboard';
            } else {
              window.location.href = '/employee/dashboard';
            }
          }, 1000);
        } else {
          throw new Error('Invalid response from server');
        }

      } catch (error) {
        console.error('Login error:', error);
        showError(error.message);
        setLoading(false);
      }
    });

    // Clear error on input
    document.getElementById('phone').addEventListener('input', hideError);
    document.getElementById('password').addEventListener('input', hideError);
  </script>
</body>
</html>
